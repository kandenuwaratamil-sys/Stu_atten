<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; height: 100vh; display: flex; justify-content: center; align-items: center; }
.app { display: flex; gap: 20px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 24px; max-width: 1100px; width: 95%; height: 90vh; }
.left { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.right { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid #e0e0e0; padding-left: 20px; }
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.nav button { background: #e8e8e8; border: none; border-radius: 8px; padding: 8px 16px; font-size: 18px; cursor: pointer; transition: background .2s; }
.nav button:hover { background: #d0d0d0; }
.nav h2 { font-size: 20px; font-weight: 600; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; flex: 1; align-content: start; }
.day-header { text-align: center; font-weight: 600; font-size: 13px; color: #666; padding: 8px 0; }
.day-cell { border-radius: 8px; padding: 6px; text-align: center; cursor: pointer; transition: all .15s; border: 2px solid transparent; background: #f7f8fa; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.day-cell:hover { border-color: #4a90d9; background: #eef3fc; }
.day-cell.empty { background: transparent; cursor: default; }
.day-cell.empty:hover { border-color: transparent; background: transparent; }
.day-cell.selected { border-color: #4a90d9; background: #dbeafe; }
.day-cell.today .day-number { color: #2563eb; font-weight: 700; }
.day-number { font-size: 15px; font-weight: 500; }
.day-counts { font-size: 11px; margin-top: 2px; }
.day-counts .present { color: #16a34a; }
.day-counts .absent { color: #dc2626; }
.day-cell.all-present { background: #dcfce7; }
.day-cell.all-absent { background: #fee2e2; }
.day-cell.mixed { background: #fef9c3; }
.panel h3 { font-size: 15px; margin-bottom: 12px; }
.panel h4 { font-size: 13px; color: #666; margin-bottom: 8px; }
.student-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.student-row label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
.student-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
.student-row .status { font-size: 12px; font-weight: 500; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge.present { background: #dcfce7; color: #16a34a; }
.badge.absent { background: #fee2e2; color: #dc2626; }
.actions { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
.actions button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; font-size: 13px; cursor: pointer; transition: all .2s; }
.actions button:hover { background: #f0f0f0; }
.actions button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.actions button.primary:hover { background: #1d4ed8; }
.actions button.danger { color: #dc2626; border-color: #dc2626; }
.actions button.danger:hover { background: #fee2e2; }
.summary { flex: 1; overflow-y: auto; margin-top: 8px; }
.summary-item { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.summary-item .name { font-weight: 500; }
.summary-item .stats { color: #666; font-size: 12px; margin-top: 2px; }
.empty-state { color: #999; font-size: 13px; text-align: center; padding: 20px 0; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #fff; border-radius: 12px; padding: 20px; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.modal h3 { margin-bottom: 12px; }
.modal input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
.modal-actions button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.modal-actions button.danger { background: #dc2626; color: #fff; border-color: #dc2626; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="left">
    <div class="nav">
      <button onclick="prevMonth()">◀</button>
      <h2 id="monthLabel"></h2>
      <button onclick="nextMonth()">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>
  <div class="right">
    <div class="panel">
      <h3>Attendance</h3>
      <h4 id="dateLabel">Select a date</h4>
      <div id="attendanceList"></div>
      <div class="actions">
        <button onclick="addStudent()" class="primary">+ Add Student</button>
        <button onclick="removeStudent()" class="danger">− Remove</button>
        <button onclick="markAllPresent()">All Present</button>
      </div>
      <h3 style="margin-top:12px">Summary</h3>
      <div class="summary" id="summary"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'attendance_data';
let data = { students: [], attendance: {} };
let year = new Date().getFullYear();
let month = new Date().getMonth();
let selectedDate = null;

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { data = JSON.parse(raw); } catch(e) { data = { students: [], attendance: {} }; }
  }
  if (!data.students) data.students = [];
  if (!data.attendance) data.attendance = {};
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function fmtDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function render() {
  renderCalendar();
  if (selectedDate) renderAttendance();
  else document.getElementById('attendanceList').innerHTML = '<div class="empty-state">Click a day to mark attendance</div>';
  renderSummary();
}

function renderCalendar() {
  const el = document.getElementById('calendar');
  const monthLabel = document.getElementById('monthLabel');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  monthLabel.textContent = `${months[month]} ${year}`;

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = days.map(d => `<div class="day-header">${d}</div>`).join('');

  const first = new Date(year, month, 1);
  const startDay = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const todayStr = fmtDate(today);

  for (let i = 0; i < startDay; i++) {
    html += `<div class="day-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = dateStr(year, month, d);
    const isToday = ds === todayStr;
    const isSelected = ds === selectedDate;

    let extraClass = isSelected ? ' selected' : '';
    if (isToday) extraClass += ' today';

    let counts = '', statusClass = '';
    if (data.attendance[ds] && data.students.length) {
      const rec = data.attendance[ds];
      let present = 0, absent = 0;
      data.students.forEach(s => {
        if (rec[s] === true) present++;
        else if (rec[s] === false) absent++;
      });
      counts = `<div class="day-counts"><span class="present">P:${present}</span> <span class="absent">A:${absent}</span></div>`;
      if (present > 0 && absent === 0) statusClass = ' all-present';
      else if (present === 0 && absent > 0) statusClass = ' all-absent';
      else if (present > 0 && absent > 0) statusClass = ' mixed';
    }

    html += `<div class="day-cell${statusClass}${extraClass}" onclick="selectDate('${ds}')">
      <div class="day-number">${d}</div>${counts}
    </div>`;
  }

  el.innerHTML = html;
}

function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
  renderAttendance();
}

function renderAttendance() {
  const el = document.getElementById('attendanceList');
  const dateLabel = document.getElementById('dateLabel');
  if (!selectedDate) {
    dateLabel.textContent = 'Select a date';
    el.innerHTML = '<div class="empty-state">Click a day to mark attendance</div>';
    return;
  }
  const d = new Date(selectedDate + 'T12:00:00');
  const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
  dateLabel.textContent = d.toLocaleDateString('en-US', opts);

  if (!data.students.length) {
    el.innerHTML = '<div class="empty-state">No students yet. Click "+ Add Student" to begin.</div>';
    return;
  }

  if (!data.attendance[selectedDate]) data.attendance[selectedDate] = {};
  const rec = data.attendance[selectedDate];

  let html = '';
  data.students.forEach(s => {
    const present = rec[s] === true;
    html += `<div class="student-row">
      <label><input type="checkbox" ${present ? 'checked' : ''} onchange="toggleAttendance('${s}', this.checked)"> ${s}</label>
      <span class="badge ${present ? 'present' : 'absent'}">${present ? 'Present' : 'Absent'}</span>
    </div>`;
  });
  el.innerHTML = html;
}

function toggleAttendance(student, present) {
  if (!selectedDate) return;
  if (!data.attendance[selectedDate]) data.attendance[selectedDate] = {};
  data.attendance[selectedDate][student] = present;
  save();
  render();
}

function addStudent() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <h3>Add Student</h3>
    <input type="text" id="studentNameInput" placeholder="Enter student name" autofocus>
    <div class="modal-actions">
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="primary" onclick="confirmAddStudent()">Add</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('studentNameInput').focus();
  document.getElementById('studentNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAddStudent(); });
}

function confirmAddStudent() {
  const input = document.getElementById('studentNameInput');
  const name = input.value.trim();
  if (!name) return;
  if (data.students.includes(name)) { alert('Student already exists.'); return; }
  data.students.push(name);
  save();
  render();
  document.querySelector('.modal-overlay').remove();
}

function removeStudent() {
  if (!data.students.length) { alert('No students to remove.'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  let list = data.students.map((s, i) =>
    `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer">
      <input type="radio" name="removeStudent" value="${i}" ${i===0?'checked':''}> ${s}
    </label>`
  ).join('');
  overlay.innerHTML = `<div class="modal">
    <h3>Remove Student</h3>
    ${list}
    <div class="modal-actions" style="margin-top:12px">
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="danger" onclick="confirmRemoveStudent()">Remove</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function confirmRemoveStudent() {
  const sel = document.querySelector('input[name="removeStudent"]:checked');
  if (!sel) return;
  const idx = parseInt(sel.value);
  const name = data.students[idx];
  data.students.splice(idx, 1);
  Object.keys(data.attendance).forEach(d => {
    delete data.attendance[d][name];
    if (!Object.keys(data.attendance[d]).length) delete data.attendance[d];
  });
  save();
  if (selectedDate && !data.attendance[selectedDate]) delete data.attendance[selectedDate];
  render();
  document.querySelector('.modal-overlay').remove();
}

function markAllPresent() {
  if (!selectedDate || !data.students.length) return;
  if (!data.attendance[selectedDate]) data.attendance[selectedDate] = {};
  data.students.forEach(s => { data.attendance[selectedDate][s] = true; });
  save();
  render();
}

function renderSummary() {
  const el = document.getElementById('summary');
  if (!data.students.length) {
    el.innerHTML = '<div class="empty-state">No students</div>';
    return;
  }
  const totalDays = Object.keys(data.attendance).length;
  if (!totalDays) {
    el.innerHTML = '<div class="empty-state">No attendance data yet</div>';
    return;
  }
  let html = `<div style="font-size:12px;color:#666;margin-bottom:8px">Days tracked: ${totalDays}</div>`;
  data.students.forEach(s => {
    let present = 0, absent = 0;
    Object.values(data.attendance).forEach(rec => {
      if (rec[s] === true) present++;
      else if (rec[s] === false) absent++;
    });
    const pct = totalDays ? Math.round(present / totalDays * 100) : 0;
    html += `<div class="summary-item">
      <div class="name">${s}</div>
      <div class="stats">Present: ${present} (${pct}%) &middot; Absent: ${absent}</div>
    </div>`;
  });
  el.innerHTML = html;
}

function prevMonth() { month--; if (month < 0) { month = 11; year--; } selectedDate = null; render(); }
function nextMonth() { month++; if (month > 11) { month = 0; year++; } selectedDate = null; render(); }

load();
render();
</script>
</body>
</html>
